<html lang="it">

  <meta charset="UTF-8" />

  <title>Magic Motorsport · US Accounts HD (Protetto)</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght=400;600;700&family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy:      #002868;
      --red:       #BF0A30;
      --red-light: #e8002e;
      --white:     #FFFFFF;
      --cream:     #FAFAF7;
      --line:      #D9E4F0;
      --ink:       #1A1A2E;
      --ink-soft:  #4A5568;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        repeating-linear-gradient(
          transparent,
          transparent 27px,
          var(--line) 27px,
          var(--line) 28px
        );
      background-attachment: fixed;
    }

    .lock-container {
      width: 100%;
      max-width: 400px;
      background: var(--white);
      border: 1.5px solid #DCE5F0;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 40, 104, 0.15);
      position: relative;
      overflow: hidden;
      padding: 40px 30px;
    }

    .lock-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        var(--red)    0px,
        var(--red)    40px,
        var(--white)  40px,
        var(--white)  50px,
        var(--navy)   50px,
        var(--navy)   90px
      );
    }

    .lock-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .lock-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .lock-title {
      font-family: 'Caveat', cursive;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .lock-subtitle {
      font-size: 0.8rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-family: 'Caveat', cursive;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--navy);
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #DCE5F0;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s ease;
    }

    .form-input:focus {
      border-color: var(--navy);
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--ink-soft);
      cursor: pointer;
      user-select: none;
      margin-bottom: 24px;
    }

    .remember-me input {
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      background-color: var(--navy);
      color: var(--white);
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.15s ease;
      box-shadow: 0 4px 10px rgba(0, 40, 104, 0.2);
    }

    .submit-btn:hover {
      background-color: var(--red);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      margin-top: 15px;
      font-size: 0.82rem;
      color: var(--red);
      text-align: center;
      font-weight: 600;
      display: none;
    }

    .loading-spinner {
      display: none;
      margin: 15px auto 0;
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--navy);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="lock-container">

      <p class="lock-subtitle">Magic Motorsport · US & CA</p>
    </div>

    <form id="lockForm" onsubmit="handleUnlock(event)">
      <div class="form-group">
        <label for="password">Password di Accesso</label>
        <input type="password" id="password" class="form-input" placeholder="Inserisci la password..." required autofocus />
      </div>

      <label class="remember-me">
        <input type="checkbox" id="rememberMe" />
        Ricordami su questo browser
      </label>

      <button type="submit" class="submit-btn" id="submitBtn">Sblocca Vault 🏁</button>
      <div class="loading-spinner" id="loadingSpinner"></div>
      <div class="error-msg" id="errorMsg">Password errata. Riprova!</div>
    </form>
  </div>

    function hexToBytes(hex) {
      const bytes = new Uint8Array(hex.length / 2);
      for (let i = 0; i < bytes.length; i++) {
        bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
      }
      return bytes;
    }

    async function decrypt(password) {
      const salt = hexToBytes(saltHex);
      const iv = hexToBytes(ivHex);
      const ciphertext = hexToBytes(ciphertextHex);

      const encoder = new TextEncoder();
      const baseKey = await window.crypto.subtle.importKey(
        "raw",
        encoder.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      const aesKey = await window.crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: salt,
          iterations: 100000,
          hash: "SHA-256"
        },
        baseKey,
        {
          name: "AES-GCM",
          length: 256
        },
        false,
        ["decrypt"]
      );

      const decrypted = await window.crypto.subtle.decrypt(
        {
          name: "AES-GCM",
          iv: iv,
          tagLength: 128
        },
        aesKey,
        ciphertext
      );

      return new TextDecoder().decode(decrypted);
    }

    async function tryUnlock(password, save) {
      const errorMsg = document.getElementById('errorMsg');
      const spinner = document.getElementById('loadingSpinner');
      const submitBtn = document.getElementById('submitBtn');

      errorMsg.style.display = 'none';
      spinner.style.display = 'block';
      submitBtn.style.display = 'none';

      try {
        const decryptedHtml = await decrypt(password);
        if (save) {
          localStorage.setItem('magic_motorsport_vault_pass', password);

        document.open();

        document.close();

        submitBtn.style.display = 'block';
        errorMsg.style.display = 'block';
        localStorage.removeItem('magic_motorsport_vault_pass');
      }
    }
